<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map‑App (placeholder)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin:0; padding:0; background:#f7f7f7; color:#333; display:flex; flex-direction:column; min-height:100vh;}
        header {background:#2c3e50; color:#fff; padding:1rem; text-align:center;}
        main {flex:1; display:flex; align-items:center; justify-content:center; padding:2rem;}
        a {color:#0066cc;}
    </style>
</head>
<body>
    <header>
        <h1>Map‑App</h1>
        <p>🚧  Placeholder – real map will be added soon 🚧</p>
    </header>
    <main>
        <div style="text-align:center; max-width:600px; margin:auto;">
            <h2>Find a location</h2>
            <input id="searchInput" type="text" placeholder="Enter address" style="width:70%; padding:0.5rem; font-size:1rem;"/>
            <button id="searchBtn" style="padding:0.5rem 1rem; font-size:1rem; margin-left:0.5rem;">Search</button>
            <div id="result" style="margin-top:1rem; color:#2c3e50;"></div>
        </div>
        <script>
            // Simple geocoding using Nominatim (free OSM service)
            function performSearch() {
                const query = document.getElementById('searchInput').value.trim();
                const resultDiv = document.getElementById('result');
                if (!query) { resultDiv.textContent = 'Please enter an address.'; return; }
                resultDiv.textContent = 'Searching...';
                const url = `https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(query)}`;
                fetch(url, { headers: { 'Accept-Language': 'en' } })
                    .then(resp => resp.json())
                    .then(data => {
                        if (data && data.length > 0) {
                            // Build a list of results
                            let html = '';
                            data.forEach((place, idx) => {
                                html += `<div style="background:#fff; border:1px solid #ddd; border-radius:4px; padding:0.75rem; margin-bottom:0.75rem; text-align:left;">
                                            <div style="font-weight:bold; color:#2c3e50; margin-bottom:0.25rem;">
                                                <span style="background:#3498db; color:#fff; padding:0.15rem 0.5rem; border-radius:3px; margin-right:0.5rem; font-size:0.85rem;">#${idx + 1}</span>
                                                ${escapeHtml(place.display_name)}
                                            </div>
                                            <div style="color:#666; font-size:0.9rem;">
                                                <span>Latitude: ${place.lat}</span> | <span>Longitude: ${place.lon}</span>
                                            </div>
                                         </div>`;
                            });
                            resultDiv.innerHTML = html;
                        } else {
                            resultDiv.textContent = 'No results found.';
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        resultDiv.textContent = 'Error while searching.';
                    });
            }

            document.getElementById('searchBtn').addEventListener('click', performSearch);

            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        </script>
    </main>
</body>
</html>
