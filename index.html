<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title data-i18n="appTitle">地圖應用程式</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans Traditional Chinese', 'Microsoft JhengHei', Helvetica, Arial, sans-serif; margin:0; padding:0; background:#f7f7f7; color:#333; display:flex; flex-direction:column; min-height:100vh;}
        header {background:#2c3e50; color:#fff; padding:1rem; text-align:center;}
        main {flex:1; display:flex; flex-direction:column; align-items:center; padding:2rem; max-width:800px; margin:0 auto; width:100%; box-sizing:border-box;}
        .search-container {background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); padding:1.5rem; width:100%; box-sizing:border-box; margin-bottom:1rem;}
        .dropdown-row {display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap;}
        .dropdown-group {flex:1; min-width:150px;}
        .dropdown-group label {display:block; font-size:0.85rem; color:#666; margin-bottom:0.25rem; font-weight:500;}
        select {width:100%; padding:0.5rem; font-size:0.9rem; border:1px solid #ddd; border-radius:4px; background:#fff; box-sizing:border-box;}
        select:disabled {background:#f5f5f5; cursor:not-allowed;}
        .search-row {display:flex; gap:0.5rem; align-items:center;}
        #searchInput {flex:1; padding:0.75rem; font-size:1rem; border:1px solid #ddd; border-radius:4px;}
        #searchBtn {padding:0.75rem 1.5rem; font-size:1rem; background:#3498db; color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:500;}
        #searchBtn:hover {background:#2980b9;}
        #result {margin-top:1rem; width:100%;}
        .filter-badge {background:#27ae60; color:#fff; padding:0.5rem 1rem; border-radius:4px; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem; font-size:0.9rem;}
        .filter-badge button {background:transparent; border:none; color:#fff; cursor:pointer; font-size:1rem; padding:0 0.25rem;}
        .filter-badge button:hover {opacity:0.8;}
        .amenity-suggestions {margin-top:0.75rem; display:flex; flex-wrap:wrap; gap:0.5rem; min-height:2rem;}
        .amenity-chip {background:#ecf0f1; color:#2c3e50; padding:0.4rem 0.8rem; border-radius:20px; font-size:0.85rem; cursor:pointer; border:1px solid #bdc3c7; transition:all 0.2s;}
        .amenity-chip:hover {background:#3498db; color:#fff; border-color:#3498db;}
        h2 {margin:0 0 1rem 0; color:#2c3e50; font-size:1.25rem;}
        
        @media (max-width: 600px) {
            .dropdown-row {flex-direction:column;}
            .dropdown-group {min-width:100%;}
            .search-row {flex-direction:column;}
            #searchInput {width:100%;}
            #searchBtn {width:100%;}
        }
    </style>
</head>
<body>
    <header>
        <h1 data-i18n="appTitle">地圖應用程式</h1>
        <p data-i18n="appSubtitle">按港鐵站搜尋</p>
    </header>
    <main>
        <div class="search-container">
            <h2 data-i18n="selectMTRStation">選擇港鐵站</h2>
            
            <div class="dropdown-row">
                <div class="dropdown-group">
                    <label for="regionSelect" data-i18n="regionLabel">地區</label>
                    <select id="regionSelect">
                        <option value="" data-i18n="allHongKong">全香港</option>
                        <option value="hong_kong_island" data-i18n="hongKongIsland">港島</option>
                        <option value="kowloon" data-i18n="kowloon">九龍</option>
                        <option value="new_territories" data-i18n="newTerritories">新界</option>
                    </select>
                </div>
                
                <div class="dropdown-group">
                    <label for="lineSelect" data-i18n="lineLabel">路綫</label>
                    <select id="lineSelect" disabled>
                        <option value="" data-i18n="selectLine">選擇路綫</option>
                    </select>
                </div>
                
                <div class="dropdown-group">
                    <label for="stationSelect" data-i18n="stationLabel">車站</label>
                    <select id="stationSelect" disabled>
                        <option value="" data-i18n="selectStation">選擇車站</option>
                    </select>
                </div>
                
                <div class="dropdown-group" style="flex:0 0 120px;">
                    <label for="radiusSelect" data-i18n="radiusLabel">範圍</label>
                    <select id="radiusSelect">
                        <option value="0.5">500 米</option>
                        <option value="1" selected>1 公里</option>
                        <option value="1.5">1.5 公里</option>
                        <option value="2">2 公里</option>
                        <option value="3">3 公里</option>
                    </select>
                </div>
            </div>
            
            <h2 data-i18n="searchPOI">搜尋地點或地址</h2>
            <div class="search-row">
                <input id="searchInput" type="text" data-i18n="searchPlaceholder" placeholder="輸入地點或地址 (例如：麥當勞，餐廳)"/>
                <button id="searchBtn" data-i18n="searchBtn">搜尋</button>
            </div>
            <div id="amenitySuggestions" class="amenity-suggestions"></div>
        </div>
        
        <div id="activeFilter" class="filter-badge" style="display:none;">
            <span><span data-i18n="searchingNear">搜尋附近：</span><strong id="filterStation"></strong> MTR</span>
            <span>(<span id="filterRadius"></span> <span data-i18n="radius">範圍內</span>)</span>
            <button id="clearFilter" title="" data-i18n="clearFilter">清除篩選</button>
        </div>
        
        <div id="result"></div>
    </main>
    
    <script src="src/i18n.js"></script>
    <script src="src/amenity-suggestions.js"></script>
    <script src="src/mtr-stations.js"></script>
    <script src="src/dropdowns.js"></script>
    <script src="src/search.js"></script>
    <script>
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => I18N.init());
        } else {
            I18N.init();
        }
    </script>
</body>
</html>
